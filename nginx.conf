worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events { worker_connections 256; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;
    sendfile      on;
    keepalive_timeout 65;

    upstream backend  { server 127.0.0.1:8000; }
    upstream frontend { server 127.0.0.1:3000; }

    server {
        listen 7860;

        # FastAPI endpoints (all non-static API routes)
        location ~ ^/(health|reset|step|state|tasks|docs|openapi\.json|grade|timeline|info|dashboard|metadata|schema|predict|predict_and_step|model|score|report|start-sim|start_sim|stop-sim|sim-status|inference|orchestrated_action)(/|$) {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Next.js frontend (everything else)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
